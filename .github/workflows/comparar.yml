name: Comparar Articulos Duplicados

on:
  repository_dispatch:
    types: [ejecutar-comparacion]
  workflow_dispatch:

jobs:
  comparar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v3

      - name: Instalar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install rapidfuzz openpyxl pandas requests Office365-REST-Python-Client

      - name: Descargar archivos de SharePoint
        env:
          SP_USER: ${{ secrets.SP_USER }}
          SP_PASS: ${{ secrets.SP_PASS }}
        run: |
          python - <<'EOF'
          import os
          from office365.sharepoint.client_context import ClientContext
          from office365.runtime.auth.user_credential import UserCredential

          site_url = "https://numar.sharepoint.com/sites/PRODUCTHUB"
          ctx = ClientContext(site_url).with_credentials(
              UserCredential(os.environ['SP_USER'], os.environ['SP_PASS'])
          )

          archivos = {
              "/sites/PRODUCTHUB/Shared Documents/base_principal.xlsx": "base_principal.xlsx",
              "/sites/PRODUCTHUB/Shared Documents/base_comparar.xlsx": "base_comparar.xlsx"
          }

          for ruta_sp, nombre_local in archivos.items():
              print(f"📥 Descargando {nombre_local}...")
              with open(nombre_local, "wb") as f:
                  ctx.web.get_file_by_server_relative_url(ruta_sp).download(f).execute_query()
              print(f"   ✅ {nombre_local} descargado")
          EOF

      - name: Ejecutar comparación
        run: python comparar.py

      - name: Subir resultado a SharePoint
        env:
          SP_USER: ${{ secrets.SP_USER }}
          SP_PASS: ${{ secrets.SP_PASS }}
        run: |
          python - <<'EOF'
          import os
          from office365.sharepoint.client_context import ClientContext
          from office365.runtime.auth.user_credential import UserCredential

          site_url = "https://numar.sharepoint.com/sites/PRODUCTHUB"
          ctx = ClientContext(site_url).with_credentials(
              UserCredential(os.environ['SP_USER'], os.environ['SP_PASS'])
          )

          ruta_destino = "/sites/PRODUCTHUB/Shared Documents/resultado_comparacion.xlsx"
          
          with open("resultado_comparacion.xlsx", "rb") as f:
              ctx.web.get_folder_by_server_relative_url(
                  "/sites/PRODUCTHUB/Shared Documents"
              ).upload_file("resultado_comparacion.xlsx", f.read()).execute_query()

          print("✅ resultado_comparacion.xlsx subido a SharePoint")
          EOF
